<section class="bp-hero">
  <div class="container-fluid">
    <div class="parent">
      <img class="bp-hero__img" [src]="imageUrl" [alt]="imageAlt || title" />
      <div class="bp-hero__shade"></div>
      <div class="bp-hero__glass">
        <h1>{{ title }}</h1>
        <p>{{ description }}</p>
      </div>
    </div>
  </div>
</section>
