<div class="bp-page">

  <!-- Hero -->
  <section class="bp-hero">
    <div class="container-fluid">
      <div class="parent">
        <img class="bp-hero__img" [src]="heroImage" alt="Branded Products fulfilment centre" />
        <div class="bp-hero__shade"></div>
        <div class="bp-hero__glass">
          <h1>Branded Products &amp; Customization</h1>
          <p>High-quality apparel and stationery tailored to your brand with flexible ordering, precise customization,
            and
            fast turnaround.</p>
        </div>
      </div>

    </div>

  </section>

  <!-- Alternating showcase sections (Branding / Customization) -->
  <div class="bp-sections">
    <app-branding-showcase-block *ngFor="let s of sections" [title]="s.title" [items]="s.items" [reverse]="s.reverse"
      [imageUrl]="s.imageUrl">
    </app-branding-showcase-block>
  </div>

  <!-- Bottom benefit cards -->
  <div class="bp-benefits">
    <app-branding-benefit-card *ngFor="let b of benefits" [title]="b.title" [description]="b.description"
      [icon]="b.icon">
    </app-branding-benefit-card>
  </div>

</div>
