<div class="prizes-container">
    <div class="prizes-header">
        <h2>Prizes Details</h2>
    </div>

    <div class="games-list">
        <!-- Dynamic Games Loop -->
        <div class="game-card expanded" *ngFor="let game of games" [class.expanded]="expandedGame === game.gameId">
            <div class="game-header" (click)="toggleGame(game.gameId)">
                <div class="game-info">
                    <img src="assets/images/{{ game.iconName }}" [alt]="game.gameName" class="game-icon">
                    <!-- <div class="game-title-section">
                        <span class="game-title">{{ game.gameName }}</span>
                        <span class="game-badge" *ngIf="game.NumberOfBalls">Pick {{ game.NumberOfBalls }} Balls</span>
                    </div> -->
                </div>
                <div class="chevron" [class.rotated]="expandedGame === game.gameId">
                    <img src="assets/images/arrow-down-white.svg" alt="Arrow Icon">
                </div>
            </div>

            <div class="game-content" *ngIf="expandedGame === game.gameId">
                <!-- Dynamic Play Types Loop -->
                <div class="play-type" *ngFor="let playType of game.ticketTypes">
                    <h3>{{ playType.items[0].TicketTypeName }}</h3>
                    <!-- <p class="description">{{ playType.description }}</p> -->
                    <table class="prize-table">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>No. of Matches</th>
                                <th>Prize</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Dynamic Prizes Loop -->
                            <ng-container *ngFor="let prize of playType.items;let i =index ">
                                <tr>
                                    <td>
                                        {{ (game.gameId == 38 && i == 0)? 'Jackpot' : i+1 }}</td>
                                    <td>{{ prize.Hits}}</td>
                                    <td>
                                        <div class="icon-amount">
                                            <span class="dirham-symbol"><img
                                                    src="assets/images/uae-symbol-white.png" alt=""></span>
                                            <span class="amount">{{ prize.Value | number }}</span>
                                        </div>

                                    </td>
                                </tr>
                                <tr class="border" *ngIf="i < playType.items.length - 1">
                                    <td colspan="3"></td>
                                </tr>
                            </ng-container>

                        </tbody>
                    </table>
                </div>

                <!-- <button class="play-button">
                    Play / <span class="dirham-symbol"><img src="assets/images/UAE_Dirham_Symbol.svg" alt=""></span>{{
                    game.playPrice }}
                </button> -->
            </div>
        </div>
    </div>
</div>
