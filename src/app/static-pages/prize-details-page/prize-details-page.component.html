<div class="prizes-container">
    <div class="prizes-header">
        <h2>Prizes Distribution</h2>
    </div>

    <div class="games-list">
        <!-- Dynamic Games Loop -->
        <div class="game-card" *ngFor="let game of games" [class.expanded]="expandedGame === game.id">
            <div class="game-header" (click)="toggleGame(game.id)">
                <div class="game-info">
                    <img src="assets/images/game-icon.svg" [alt]="game.title" class="game-icon">
                    <div class="game-title-section">
                        <span class="game-title">{{ game.title }}</span>
                        <span class="game-badge" *ngIf="game.badge">{{ game.badge }}</span>
                    </div>
                </div>
                <div class="chevron" [class.rotated]="expandedGame === game.id">
                    <img src="assets/images/arrow-down-white.svg" alt="Arrow Icon">
                </div>
            </div>

            <div class="game-content" *ngIf="expandedGame === game.id">
                <!-- Dynamic Play Types Loop -->
                <div class="play-type" *ngFor="let playType of game.playTypes">
                    <h3>{{ playType.name }}</h3>
                    <!-- <p class="description">{{ playType.description }}</p> -->
                    <table class="prize-table">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>No. of Matches</th>
                                <th>Prize</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Dynamic Prizes Loop -->
                            <ng-container *ngFor="let prize of playType.prizes;let i =index ">
                                <tr>
                                    <td>{{ prize.rank }}</td>
                                    <td>{{ prize.matches }}</td>
                                    <td>
                                        <div class="icon-amount">
                                            <span class="dirham-symbol"><img
                                                    src="assets/images/UAE_Dirham_Symbol-white.svg" alt=""></span>
                                            <span class="amount">{{ prize.amount | number }}</span>
                                        </div>

                                    </td>
                                </tr>
                                <tr class="border" *ngIf="i < playType.prizes.length - 1">
                                    <td colspan="3"></td>
                                </tr>
                            </ng-container>

                        </tbody>
                    </table>
                </div>

                <!-- <button class="play-button">
                    Play / <span class="dirham-symbol"><img src="assets/images/UAE_Dirham_Symbol.svg" alt=""></span>{{
                    game.playPrice }}
                </button> -->
            </div>
        </div>
    </div>
</div>
