<div class="game-banner">

  <div class="banner-content">
    <div class="label">{{ prizePoolLabel }}</div>
    <div class="amount">
      <img class="symbol" [src]="uaeSymbol" alt="AED" />
      <span class="value">{{ prizePoolAmount }}</span>
    </div>
    <div class="countdown">
      <div class="count-title">{{ countdownTitle }}</div>
      <div class="count-values">
        <span>{{ days }}D</span>
        <span>{{ hours }}h</span>
        <span>{{ minutes }}m</span>
        <span>{{ seconds }}s</span>
      </div>
    </div>
  </div>
</div>
