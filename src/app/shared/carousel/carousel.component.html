<div class="carousel-container">
  <div class="carousel-wrapper">
    <!-- Images -->
    <div class="carousel-track">
      <div *ngFor="let image of images; let i = index" 
        class="carousel-slide" 
        [class.active]="i === currentIndex">
        <img [src]="image.url" [alt]="image.alt || 'Carousel image ' + (i + 1)" class="carousel-image">
      </div>
    </div>

    <!-- Previous Arrow -->
    <button *ngIf="showArrows && images.length > 1" 
      class="carousel-arrow carousel-arrow-prev" 
      (click)="previous()"
      aria-label="Previous slide">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>

    <!-- Next Arrow -->
    <button *ngIf="showArrows && images.length > 1" 
      class="carousel-arrow carousel-arrow-next" 
      (click)="next()"
      aria-label="Next slide">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </button>
  </div>

  <!-- Indicators -->
  <div *ngIf="showIndicators && images.length > 1" class="carousel-indicators">
    <button *ngFor="let image of images; let i = index"
      class="carousel-indicator"
      [class.active]="i === currentIndex"
      (click)="goToSlide(i)"
      [attr.aria-label]="'Go to slide ' + (i + 1)">
    </button>
  </div>
</div>
