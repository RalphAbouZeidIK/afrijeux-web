<div class="nav-container" *ngIf="showNavigation">
  <div class="nav-background"></div>
  <div class="nav-content">
    <div class="nav-item"
         *ngFor="let item of navItems"
         [class.active]="item.active"
         (click)="navigateTo(item)">
      <div class="nav-icon">
        <!-- Rectangle Group Icon for Games -->
        <svg *ngIf="item.icon === 'rectangle-group'" viewBox="0 0 27 27" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <rect x="16" y="3" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <rect x="3" y="16" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <rect x="16" y="16" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/>
        </svg>

        <!-- Prize Details Icon -->
        <svg *ngIf="item.icon === 'prize-details'" viewBox="0 0 27 27" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13.5 2L17 8H10L13.5 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="8" y="10" width="11" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="13.5" cy="16" r="2" stroke="currentColor" stroke-width="1.5"/>
        </svg>

        <!-- Scan Icon -->
        <svg *ngIf="item.icon === 'scan'" viewBox="0 0 27 27" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="4" width="19" height="19" rx="3" stroke="currentColor" stroke-width="1.5"/>
          <path d="M9 12L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="nav-label">{{ item.label }}</span>
    </div>
  </div>
  <div class="nav-shadow"></div>
</div>
