<div class="datepicker-holder" [class]="parentClass">
  <mat-form-field>
    <mat-label>{{label}}: </mat-label>
    <input matInput [matDatepicker]="picker" [(ngModel)]="dateChosen" (ngModelChange)="dateChange($event)" [min]="minDate">
    <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker #picker></mat-datepicker>
  </mat-form-field>
  <mat-form-field *ngIf="showTime" class="time-field">
    <mat-label>{{timeLabel}}: </mat-label>
    <input matInput type="time" [(ngModel)]="timeChosen" (ngModelChange)="timeChange()">
  </mat-form-field>
</div>
