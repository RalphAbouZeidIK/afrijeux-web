<h2 *ngIf="isListingPage">All Games</h2>
<div class="games-container" [ngClass]="{'listing-block':isListingPage,'game-page':isGamePage }">
    <div *ngFor="let game of allGames" class="game-card" [class.selected]="isGameSelected(game)">
        <!-- Game Header with Image -->
        <div class="game-header" *ngIf="isListingPage">
            <app-countdown [event]="game" [smallTimer]="true"></app-countdown>
            <div class="game-image" *ngIf="game.imageUrl">
                <img [src]="game.imageUrl" [alt]="game.name">
            </div>
            <div class="game-info">
                <!-- Game Title and Badge -->
                <div class="game-title-row">
                    <h3 class="game-title">{{ game.name }}</h3>
                    <span class="game-badge" *ngIf="game.badgeText">{{ game.badgeText }}</span>
                </div>

                <!-- Prize Information -->
                <div class="prize-row">
                    <p class="prize-text">
                        <span>Prize: </span>
                        <span class="prize-amount">{{ game.Prize | number:'1.0-0' }}</span>
                    </p>
                    <span class="currency-icon"><img src="assets/images/UAE_Dirham_Symbol-yellow.svg" alt=""></span>
                </div>

                <!-- Draw Information -->
                <p class="draw-info">Draw: {{ game.GameEventDate | date:'MMM d, y - hh:mm a' }}</p>
            </div>
        </div>

        <!-- Play Button -->
        <button [ngClass]="{'play-button':isListingPage,'pick-button':isBanner,'btn btn-primary':isGamePage}" [routerLink]="game.route"
            [queryParams]="{ gameEventId: game.GameEventId }">
            <ng-container *ngIf="isListingPage">
                <span>Pay /</span>
                <span class="price-tag"><img src="assets/images/UAE_Dirham_Symbol.svg" alt=""> {{ game.Stake }}</span>
            </ng-container>
            <ng-container *ngIf="!isListingPage">
                <span>{{ game.name }}</span>
            </ng-container>
        </button>
    </div>
</div>
